name: Terraform Plan (PR)

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.hcl"
      - "modules/**"
      - "environments/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  REGION: europe-north1

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Init (staging)
        run: terraform init -backend-config=environments/staging/backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (staging)
        id: plan
        run: |
          terraform plan -no-color \
            -var-file=environments/staging/terraform.tfvars \
            -var="supabase_url=placeholder" \
            -var="supabase_anon_key=placeholder" 2>&1 | tee plan_output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan (staging)\n\n\`\`\`\n${truncated}\n\`\`\``
            });
